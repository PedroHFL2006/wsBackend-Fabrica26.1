<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Novo Cadastro</h1>
    <form action="{% url 'wizards' %}" method="POST">
        {% csrf_token %}
        <label>Nome:</label><br>
        <input type="text" name="nome" required><br>
    
        <label>Idade:</label><br>
        <input type="number" name="idade" required><br>
    
        <label>E-mail:</label><br>
        <input type="email" name="email" required><br>
    
        <label>Telefone:</label><br>
        <input type="text" name="telefone" required><br><br>

        <label>Casa de Hogwarts:</label><br>
        <select name="casa" required>
            <option value="" disabled selected>Selecione uma Casa</option>
            {% for casa in casas %}
                <option value="{{ casa.id }}">{{ casa.nome }}</option>
            {% endfor %}
        </select><br><br>

        <button type="submit">Salvar Pessoa</button>
    </form>
    <br>
    <a href="{% url 'wizards' %}">Voltar para lista</a>
</body>
</html>

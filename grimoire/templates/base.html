<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Grimoire{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
    background-color: #0a0e1a; /* Azul muito escuro */
    background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
    background-attachment: fixed;
    color: #eccf95; 
}

a {
    color: #ffc107; 
    text-decoration: none;
    font-weight: bold;
    transition: all 0.3s ease;
}

a:hover {
    color: #ffffff; 
    text-shadow: 0 0 10px #ffc107, 0 0 20px #ffc107; 
}

.btn-link {
    color: #a0a0a0 !important; 
}

.btn-link:hover {
    color: #ffffff !important;
}

.table {
    background-color: rgba(255, 255, 255, 0.05); 
    color: #f0e6d2; 
    border: 1px solid #30363d;
}

.table-striped tbody tr:nth-of-type(odd) {
    background-color: rgba(255, 255, 255, 0.02);
}
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'wizards' %}">[🧙‍♂️ Grimoire]</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
